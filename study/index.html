<style>*{box-sizing:border-box;margin:0;padding:0}body{margin:0;background:#fff;color:#111;font-family:system-ui,sans-serif}:root{--color-text-primary:#111;--color-text-secondary:#666;--color-border-tertiary:rgba(0,0,0,0.12);--color-border-secondary:rgba(0,0,0,0.25);--color-background-primary:#fff;--color-background-secondary:#f7f7f5;--color-background-tertiary:#f0ede8;--border-radius-lg:12px;--border-radius-md:8px}.path-wrap{padding:1.5rem 1rem;max-width:720px;margin:0 auto}.legend{display:flex;flex-wrap:wrap;gap:.5rem 1rem;margin-bottom:1.25rem;padding-left:calc(40px + 1rem)}.legend-item{display:flex;align-items:center;gap:.4rem;font-size:12px;color:var(--color-text-secondary)}.legend-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}.node-row{display:flex;align-items:flex-start;gap:1rem}.spine-col{display:flex;flex-direction:column;align-items:center;width:40px;flex-shrink:0}.dot{width:14px;height:14px;border-radius:50%;flex-shrink:0;margin-top:5px;cursor:pointer;transition:transform .15s}.dot:hover{transform:scale(1.25)}.dot.active{outline:3px solid var(--dot-color);outline-offset:2px}.line{width:2px;flex:1;min-height:20px;background:var(--color-border-tertiary)}.node-card{flex:1;border:0.5px solid var(--color-border-tertiary);border-radius:12px;padding:.75rem 1rem;cursor:pointer;transition:border-color .15s;margin-bottom:1rem}.node-card:hover{border-color:var(--color-border-secondary)}.node-card.active{border-left:3px solid var(--dot-color);background:var(--color-background-secondary)}.node-row.unread .dot{opacity:.5}.node-row.unread .node-card{opacity:.6}.node-meta{display:flex;align-items:center;gap:.5rem;flex-wrap:wrap;margin-bottom:.2rem}.node-author{font-size:13px;font-weight:500;color:var(--color-text-primary)}.node-year{font-size:12px;color:var(--color-text-secondary)}.theme-badge{font-size:11px;padding:2px 8px;border-radius:20px;font-weight:500}.doi-link{font-size:11px;padding:2px 8px;border-radius:20px;font-weight:500;text-decoration:none;border:0.5px solid var(--color-border-tertiary);color:var(--color-text-secondary);background:var(--color-background-secondary)}.doi-link:hover{border-color:var(--color-border-secondary);color:var(--color-text-primary)}.node-title{font-size:13px;color:var(--color-text-secondary);line-height:1.4}.notes{margin-top:.9rem;display:flex;flex-direction:column;gap:.75rem}.note-block h4{font-size:11px;font-weight:500;letter-spacing:.06em;text-transform:uppercase;color:var(--color-text-secondary);margin-bottom:.3rem}.note-block p{font-size:13px;line-height:1.65;color:var(--color-text-primary)}.note-block blockquote{font-size:13px;line-height:1.65;color:var(--color-text-secondary);font-style:italic;border-left:3px solid var(--dot-color,#888);padding-left:.75rem;margin:0}.note-block blockquote cite{display:block;font-size:11px;margin-top:.3rem;font-style:normal;color:var(--color-text-secondary)}.what-i-think{font-size:13px;line-height:1.65;color:var(--color-text-primary);padding:.65rem .85rem;border-radius:8px;background:var(--color-background-tertiary);border-left:3px solid var(--dot-color,#888)}</style>

const TBADGE={};
Object.entries(THEMES).forEach(([k,v])=>{const r=parseInt(v.color.slice(1,3),16),g=parseInt(v.color.slice(3,5),16),b=parseInt(v.color.slice(5,7),16);TBADGE[k]={bg:'rgba('+r+','+g+','+b+',0.12)',text:v.color,border:'rgba('+r+','+g+','+b+',0.3)'};});
let active=null;
function rNotes(notes,col){return notes.map(n=>{if(n.type==='section')return '<div class="note-block"><h4>'+n.title+'</h4><p>'+n.text+'</p></div>';if(n.type==='quote')return '<div class="note-block"><h4>direct quote</h4><blockquote style="border-left-color:'+col+'">'+n.text+'<cite>— '+n.cite+'</cite></blockquote></div>';if(n.type==='think')return '<div class="note-block"><h4>what I think</h4><div class="what-i-think" style="border-left-color:'+col+'">'+n.text+'</div></div>';return '';}).join('');}
function render(){
  const legend=Object.entries(THEMES).map(([k,v])=>'<div class="legend-item"><div class="legend-dot" style="background:'+v.color+'"></div>'+v.label+'</div>').join('');
  let h='<div class="path-wrap"><div class="legend">'+legend+'</div>';
  PAPERS.forEach((p,i)=>{
    const theme=THEMES[p.theme],badge=TBADGE[p.theme],isRead=p.read,isActive=active===p.id,isLast=i===PAPERS.length-1;
    const doi=p.doi?'<a class="doi-link" href="https://doi.org/'+p.doi+'" target="_blank" onclick="event.stopPropagation()">DOI</a>':'';
    const notes=isActive?'<div class="notes">'+rNotes(p.notes,theme.color)+'</div>':'';
    h+='<div class="node-row '+(isRead?'':'unread')+'" data-id="'+p.id+'"><div class="spine-col"><div class="dot '+(isActive?'active':'')+'" style="background:'+(isRead?theme.color:'#C8C8C8')+';--dot-color:'+theme.color+'"></div>'+(isLast?'':'<div class="line"></div>')+'</div><div class="node-card '+(isActive?'active':'')+'" style="--dot-color:'+theme.color+'"><div class="node-meta"><span class="node-author">'+p.author+'</span><span class="node-year">'+p.year+'</span><span class="theme-badge" style="background:'+(isRead?badge.bg:'var(--color-background-secondary)')+';color:'+(isRead?badge.text:'var(--color-text-secondary)')+';border:0.5px solid '+(isRead?badge.border:'var(--color-border-tertiary)')+'">'+theme.label+'</span>'+doi+'</div><div class="node-title">'+p.title+'</div>'+notes+'</div></div>';

  document.getElementById('root').innerHTML=h+'</div>';
  document.querySelectorAll('.node-row').forEach(row=>{

    const a=row.querySelector('.doi-link');if(a)a.addEventListener('click',e=>e.stopPropagation());
  });
}
